name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        build_type: [Debug, Release]
        compiler: [g++]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            git \
            ninja-build \
            libboost-dev \
            libomp-dev \
            clang-format \
            clang-tidy \
            doxygen \
            graphviz

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DVORONOI_BUILD_TESTS=ON \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Run fast tests (CTest)
        # Run the quick self-contained tests plus the Voro++ comparison to
        # verify the two libraries agree on cell volumes.
        run: |
          ctest --test-dir build \
            -R "test_static_voronoi|test_voro_comparison" \
            --output-on-failure \
            --timeout 120

  # ── Format Check ─────────────────────────────────────────────────────────────
  clang-format:
    name: clang-format check
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          CLANG_FORMAT_BIN=clang-format-18 bash tools/clang_format_check.sh

  # ── Static Analysis ───────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy static analysis
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libboost-dev \
            libomp-dev \
            clang \
            clang-tidy

      - name: Configure CMake (generate compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVORONOI_BUILD_TESTS=ON \
            -G Ninja

      - name: Run clang-tidy
        run: |
          clang-tidy \
            -p build \
            $(find include/voronoi_dynamics -name '*.hpp') \
            -- \
            -std=c++17 \
            -I include \
            2>&1 | tee clang-tidy-report.txt
          # Warn but do not fail the build on tidy issues until the code base
          # is fully clean; remove the '|| true' when all warnings are fixed.
          echo "clang-tidy completed (warnings are informational for now)"

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt

  # ── Doxygen ──────────────────────────────────────────────────────────────────
  documentation:
    name: Doxygen documentation
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libboost-dev doxygen graphviz

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DVORONOI_BUILD_TESTS=OFF \
            -DVORONOI_BUILD_DOCS=ON \
            -G Ninja

      - name: Build documentation
        run: cmake --build build --target docs

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/docs/html
